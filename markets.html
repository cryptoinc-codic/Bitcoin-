<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Binance - Markets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --binance-yellow: #FCD535; --bg-dark: #0B0E11; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--bg-dark); font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .market-container { background-color: #12161c; height: 100%; overflow-y: auto; }
        .filter-pill { background-color: #2b3139; border-radius: 4px; padding: 4px 12px; font-size: 13px; white-space: nowrap; cursor: pointer; }
        .filter-pill.active { background-color: #f0b90b; color: #1e2329; }
        .price-up-bg { background-color: #2ebd85; }
        .price-down-bg { background-color: #f6465d; }
        .price-flash-up { animation: flashUp 0.5s ease-out; }
        .price-flash-down { animation: flashDown 0.5s ease-out; }
        @keyframes flashUp { 0% { color: #2ebd85; } 100% { color: #ebecf0; } }
        @keyframes flashDown { 0% { color: #f6465d; } 100% { color: #ebecf0; } }
        .nav-item-active { color: #f0b90b !important; }
        .card-bg { background-color: #1e2329; }
        ::-webkit-scrollbar { display: none; }
        .toast-message { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #0ecb81; color: white; padding: 12px 20px; border-radius: 40px; font-size: 12px; font-weight: bold; z-index: 10001; opacity: 0; transition: opacity 0.3s; pointer-events: none; max-width: 280px; text-align: center; }
        .profile-popup { position: fixed; top: 70px; right: 20px; background: #1e2329; border-radius: 16px; padding: 20px; width: 280px; z-index: 10003; border: 1px solid rgba(252,213,53,0.3); display: none; }
        .profile-popup.active { display: block; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10002; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: #1e2329; border-radius: 24px; padding: 24px; width: 90%; max-width: 400px; border: 1px solid rgba(252,213,53,0.3); position: relative; }
        .modal-close { position: absolute; top: 16px; right: 16px; cursor: pointer; color: #848e9c; }
        .funds-modal-input { background: #2b2f36; border: 1px solid #3b424d; border-radius: 12px; padding: 14px; color: white; width: 100%; margin-bottom: 16px; }
        .search-result { padding: 12px; border-bottom: 1px solid #2b3139; cursor: pointer; }
        .search-result:hover { background: #2b3139; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div class="market-container">
    <div class="max-w-md mx-auto min-h-screen relative">
        <header class="p-4 pb-2">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-2">
                    <i data-lucide="arrow-left" class="w-6 h-6 text-white cursor-pointer" onclick="window.location.href='dashboard.html'"></i>
                    <h1 class="text-xl font-bold text-white">Markets</h1>
                </div>
                <div class="flex gap-3">
                    <i data-lucide="search" class="w-5 h-5 text-gray-400 cursor-pointer" onclick="openSearchModal()"></i>
                    <div class="w-8 h-8 bg-gray-700 rounded-full flex items-center justify-center border border-gray-600 cursor-pointer" onclick="toggleProfilePopup()">
                        <i data-lucide="user" class="w-4 h-4 text-white"></i>
                    </div>
                </div>
            </div>
            <div class="relative flex items-center bg-[#2b3139] rounded-lg px-3 py-2 mb-3">
                <i data-lucide="search" class="w-4 h-4 text-gray-400 mr-2"></i>
                <input type="text" id="coinSearch" placeholder="Search Coin Pairs" class="bg-transparent border-none outline-none text-sm w-full text-white placeholder-gray-500">
            </div>
        </header>
        
        <div class="px-4 py-2 flex gap-4 text-sm font-semibold text-gray-400 border-b border-gray-800">
            <span class="text-white border-b-2 border-yellow-500 pb-2">Crypto</span>
            <span>Spot</span>
            <span>USDⓈ-M</span>
            <span>COIN-M</span>
        </div>
        
        <div class="px-4 py-3 flex gap-2 overflow-x-auto items-center no-scrollbar border-b border-gray-900/50">
            <span class="filter-pill active" data-filter="all" onclick="setFilter('all')">All</span>
            <span class="filter-pill" data-filter="gainers" onclick="setFilter('gainers')">Top Gainers</span>
            <span class="filter-pill" data-filter="losers" onclick="setFilter('losers')">Top Losers</span>
            <span class="filter-pill" data-filter="volume" onclick="setFilter('volume')">Highest Volume</span>
            <i data-lucide="trending-up" class="w-5 h-5 text-gray-500 ml-auto"></i>
        </div>
        
        <div class="px-4 py-3 flex justify-between text-[11px] text-gray-500 font-bold uppercase tracking-wider sticky top-0 bg-[#12161c] z-10">
            <div class="flex items-center gap-1 w-[40%] cursor-pointer" onclick="sortBy('name')">Name <i data-lucide="chevron-down" class="w-3 h-3"></i></div>
            <div class="flex items-center gap-1 w-[25%] cursor-pointer" onclick="sortBy('price')">Price <i data-lucide="chevron-down" class="w-3 h-3"></i></div>
            <div class="flex items-center gap-1 w-[35%] cursor-pointer text-right justify-end" onclick="sortBy('change')">24h Change <i data-lucide="chevron-down" class="w-3 h-3"></i></div>
        </div>
        
        <div class="flex-1 overflow-y-auto no-scrollbar px-4 pb-24">
            <div id="crypto-list" class="space-y-3 py-2"></div>
        </div>
        
        <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto card-bg border-t border-gray-800/80 px-6 py-3 flex justify-between items-center z-50 backdrop-blur-md bg-opacity-95">
            <div onclick="window.location.href='dashboard.html'" id="nav-home" class="flex flex-col items-center gap-1.5 text-gray-500 cursor-pointer"><i data-lucide="home" class="w-5 h-5"></i><span class="text-[9px] font-black uppercase">Home</span></div>
            <div onclick="window.location.href='markets.html'" id="nav-markets" class="flex flex-col items-center gap-1.5 cursor-pointer nav-item-active"><i data-lucide="bar-chart-2" class="w-5 h-5"></i><span class="text-[9px] font-black uppercase">Markets</span></div>
            <div onclick="window.location.href='trade.html'" id="nav-trade" class="flex flex-col items-center gap-1.5 text-gray-500 cursor-pointer"><i data-lucide="arrow-left-right" class="w-5 h-5"></i><span class="text-[9px] font-black uppercase">Trade</span></div>
            <div onclick="window.location.href='futures.html'" id="nav-futures" class="flex flex-col items-center gap-1.5 text-gray-500 cursor-pointer"><i data-lucide="zap" class="w-5 h-5"></i><span class="text-[9px] font-black uppercase">Futures</span></div>
            <div onclick="window.location.href='wallets.html'" id="nav-wallets" class="flex flex-col items-center gap-1.5 text-gray-500 cursor-pointer"><i data-lucide="wallet" class="w-5 h-5"></i><span class="text-[9px] font-black uppercase">Wallets</span></div>
        </nav>
    </div>
</div>

<div id="profile-popup" class="profile-popup">
    <div class="profile-header"><span class="close-profile" onclick="closeProfilePopup()" style="float:right; cursor:pointer;">✕</span><div class="profile-email" id="profile-email"></div><div class="profile-id" id="profile-id"></div></div>
    <button class="logout-btn" onclick="logoutUser()" style="width:100%; margin-top:16px; padding:10px; background:#f6465d; color:white; border:none; border-radius:8px; cursor:pointer;">Logout</button>
</div>

<div id="search-modal" class="modal">
    <div class="modal-content">
        <i data-lucide="x" class="modal-close" onclick="closeModal('search-modal')"></i>
        <h3 class="text-xl font-bold mb-4 text-white">Search Cryptocurrency</h3>
        <input type="text" id="search-input" placeholder="Search by name or symbol..." class="funds-modal-input" oninput="filterSearchResults()">
        <div id="search-results" class="mt-4 max-h-64 overflow-y-auto"></div>
    </div>
</div>

<div id="toast-message" class="toast-message"></div>

<script>
    let currentUserEmail = null;
    let currentSort = { field: 'name', direction: 'asc' };
    let currentFilter = 'all';
    
    const symbols = ['BTC', 'ETH', 'BNB', 'SOL', 'XRP', 'ADA', 'AVAX', 'DOT', 'LINK', 'TRX', 'MATIC', 'NEAR', 'UNI', 'LTC', 'ICP', 'FIL', 'ARB', 'ATOM', 'OP', 'VET'];
    const names = ['Bitcoin', 'Ethereum', 'BNB', 'Solana', 'Ripple', 'Cardano', 'Avalanche', 'Polkadot', 'Chainlink', 'TRON', 'Polygon', 'Near Protocol', 'Uniswap', 'Litecoin', 'Internet Computer', 'Filecoin', 'Arbitrum', 'Cosmos', 'Optimism', 'VeChain'];
    
    let assets = symbols.map((sym, i) => {
        const isPositive = Math.random() < 0.6;
        let price = sym === 'BTC' ? 70551.90 : (sym === 'ETH' ? 3512.45 : (sym === 'BNB' ? 602.30 : (Math.random() * 500).toFixed(2)));
        let change = (Math.random() * (isPositive ? 15 : -12)).toFixed(2);
        let volume = Math.floor(Math.random() * 5000000000) + 100000000;
        return { symbol: sym, name: names[i] || sym, price: parseFloat(price), change: parseFloat(change), isPositive: parseFloat(change) >= 0, volume: volume };
    });
    
    let originalAssets = [...assets];
    
    function generateSparkline(isPositive) {
        const points = Array.from({length: 12}, () => Math.random() * 20 + 5);
        const lineColor = isPositive ? '#2ebd85' : '#f6465d';
        const svgWidth = 60, svgHeight = 20;
        const polylinePoints = points.map((p, i) => `${i * (svgWidth / points.length)}, ${svgHeight - p}`).join(' ');
        return `<svg width="${svgWidth}" height="${svgHeight}"><polyline fill="none" stroke="${lineColor}" stroke-width="1.5" points="${polylinePoints}"/></svg>`;
    }
    
    function renderMarketList(data) {
        const listContainer = document.getElementById('crypto-list');
        if(!listContainer) return;
        listContainer.innerHTML = '';
        data.forEach((asset) => {
            const colorClass = asset.isPositive ? 'price-up-bg' : 'price-down-bg';
            const changeSymbol = asset.isPositive ? '+' : '';
            const formattedPrice = asset.price >= 1 ? asset.price.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : asset.price.toFixed(4);
            listContainer.innerHTML += `
                <div class="flex justify-between items-center p-3 rounded-xl bg-[#1e2329] hover:bg-[#2b3139] transition cursor-pointer" onclick="selectCrypto('${asset.symbol}')">
                    <div class="flex items-center gap-3 w-[40%]">
                        <div class="w-10 h-10 rounded-full bg-gradient-to-br from-yellow-500 to-yellow-600 flex items-center justify-center font-bold text-sm text-black">${asset.symbol[0]}</div>
                        <div>
                            <div class="font-bold text-sm text-white">${asset.symbol}</div>
                            <div class="text-[10px] text-gray-500 truncate">${asset.name}</div>
                        </div>
                    </div>
                    <div class="w-[25%] text-right">
                        <div class="text-sm font-bold text-white price-val">$${formattedPrice}</div>
                        <div class="text-[9px] text-gray-500">${asset.volume.toLocaleString()}</div>
                    </div>
                    <div class="flex items-center justify-end w-[35%] gap-2">
                        <div class="${colorClass} change-pill text-white text-xs font-bold px-3 py-1.5 rounded-md min-w-[70px] text-center">${changeSymbol}${asset.change}%</div>
                        <div class="hidden md:block">${generateSparkline(asset.isPositive)}</div>
                    </div>
                </div>
            `;
        });
    }
    
    function sortBy(field) {
        if (currentSort.field === field) {
            currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
        } else {
            currentSort.field = field;
            currentSort.direction = 'asc';
        }
        
        let sorted = [...assets];
        sorted.sort((a, b) => {
            let aVal = a[field];
            let bVal = b[field];
            if (field === 'name') {
                aVal = a.symbol;
                bVal = b.symbol;
            }
            if (currentSort.direction === 'asc') {
                return aVal > bVal ? 1 : -1;
            } else {
                return aVal < bVal ? 1 : -1;
            }
        });
        
        assets = sorted;
        applyFilterAndRender();
    }
    
    function setFilter(filter) {
        currentFilter = filter;
        document.querySelectorAll('.filter-pill').forEach(pill => pill.classList.remove('active'));
        document.querySelector(`.filter-pill[data-filter="${filter}"]`).classList.add('active');
        
        if (filter === 'all') {
            assets = [...originalAssets];
        } else if (filter === 'gainers') {
            assets = [...originalAssets].filter(a => a.isPositive).sort((a, b) => b.change - a.change);
        } else if (filter === 'losers') {
            assets = [...originalAssets].filter(a => !a.isPositive).sort((a, b) => a.change - b.change);
        } else if (filter === 'volume') {
            assets = [...originalAssets].sort((a, b) => b.volume - a.volume);
        }
        
        applyFilterAndRender();
    }
    
    function applyFilterAndRender() {
        renderMarketList(assets);
    }
    
    function filterSearch() {
        const searchTerm = document.getElementById('coinSearch').value.toLowerCase();
        if (!searchTerm) {
            assets = [...originalAssets];
        } else {
            assets = originalAssets.filter(a => a.symbol.toLowerCase().includes(searchTerm) || a.name.toLowerCase().includes(searchTerm));
        }
        applyFilterAndRender();
    }
    
    function selectCrypto(symbol) {
        showToast(`Selected ${symbol}`, true);
    }
    
    function openSearchModal() {
        openModal('search-modal');
        filterSearchResults();
    }
    
    function filterSearchResults() {
        const searchTerm = document.getElementById('search-input')?.value.toLowerCase() || '';
        const results = originalAssets.filter(c => c.symbol.toLowerCase().includes(searchTerm) || c.name.toLowerCase().includes(searchTerm));
        const container = document.getElementById('search-results');
        if (container) {
            container.innerHTML = results.length === 0 ? '<p class="text-gray-500 text-center py-4">No results found</p>' : 
                results.slice(0, 20).map(c => `<div class="search-result" onclick="selectCryptoAndClose('${c.symbol}')"><div class="font-bold text-white">${c.symbol}</div><div class="text-xs text-gray-400">${c.name}</div><div class="text-xs text-yellow-500">$${c.price.toLocaleString()}</div></div>`).join('');
        }
    }
    
    function selectCryptoAndClose(symbol) {
        showToast(`Selected ${symbol}`, true);
        closeModal('search-modal');
        document.getElementById('search-input').value = '';
    }
    
    function showToast(msg, isSuccess = true) {
        const toast = document.getElementById('toast-message');
        toast.textContent = msg;
        toast.style.backgroundColor = isSuccess ? '#0ecb81' : '#f6465d';
        toast.style.opacity = '1';
        setTimeout(() => { toast.style.opacity = '0'; }, 3000);
    }
    
    function openModal(modalId) { 
        document.getElementById(modalId).classList.add('active'); 
        lucide.createIcons();
    }
    function closeModal(modalId) { document.getElementById(modalId).classList.remove('active'); }
    
    function toggleProfilePopup() {
        const popup = document.getElementById('profile-popup');
        if (popup.classList.contains('active')) popup.classList.remove('active');
        else { 
            document.getElementById('profile-email').innerText = currentUserEmail || 'User'; 
            document.getElementById('profile-id').innerText = `Account ID: ${Math.floor(1000000000000000 + Math.random() * 9000000000000000)}`; 
            popup.classList.add('active'); 
        }
    }
    
    function closeProfilePopup() { document.getElementById('profile-popup').classList.remove('active'); }
    
    function logoutUser() {
        localStorage.removeItem('binance_session_email');
        localStorage.removeItem('binance_user_balance');
        window.location.href = 'index.html';
    }
    
    function checkSession() {
        const savedEmail = localStorage.getItem('binance_session_email');
        if (savedEmail) {
            currentUserEmail = savedEmail;
        } else {
            window.location.href = 'index.html';
        }
    }
    
    function startPriceUpdates() {
        setInterval(() => {
            const numToUpdate = Math.floor(Math.random() * 5) + 3;
            for(let i = 0; i < numToUpdate; i++) {
                const idx = Math.floor(Math.random() * originalAssets.length);
                const asset = originalAssets[idx];
                const oldPrice = asset.price;
                const changePercent = (Math.random() - 0.5) * 0.02;
                const newPrice = oldPrice * (1 + changePercent);
                const priceChange = newPrice - oldPrice;
                const percentChange = (priceChange / oldPrice) * 100;
                
                asset.price = newPrice;
                asset.change = parseFloat(percentChange.toFixed(2));
                asset.isPositive = asset.change >= 0;
                
                const assetInDisplay = assets.find(a => a.symbol === asset.symbol);
                if (assetInDisplay) {
                    assetInDisplay.price = newPrice;
                    assetInDisplay.change = asset.change;
                    assetInDisplay.isPositive = asset.isPositive;
                }
            }
            applyFilterAndRender();
        }, 3000);
    }
    
    window.addEventListener('load', () => {
        checkSession();
        lucide.createIcons();
        renderMarketList(assets);
        document.getElementById('coinSearch').addEventListener('input', filterSearch);
        startPriceUpdates();
    });
</script>
</body>
</html>
