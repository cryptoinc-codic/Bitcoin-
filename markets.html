<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Binance - Markets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --binance-yellow: #FCD535; --bg-dark: #0B0E11; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--bg-dark); font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .market-container { background-color: #12161c; height: 100%; overflow-y: auto; }
        .filter-pill { background-color: #2b3139; border-radius: 4px; padding: 4px 12px; font-size: 13px; white-space: nowrap; cursor: pointer; transition: all 0.2s; }
        .filter-pill.active { background-color: #f0b90b; color: #1e2329; }
        .price-up-bg { background-color: #2ebd85; }
        .price-down-bg { background-color: #f6465d; }
        .change-pill {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 85px;
            display: inline-block;
        }
        .price-flash-up { animation: flashUp 0.5s ease-out; }
        .price-flash-down { animation: flashDown 0.5s ease-out; }
        @keyframes flashUp { 0% { color: #2ebd85; } 100% { color: #ebecf0; } }
        @keyframes flashDown { 0% { color: #f6465d; } 100% { color: #ebecf0; } }
        .nav-item-active { color: #f0b90b !important; }
        .card-bg { background-color: #1e2329; }
        ::-webkit-scrollbar { display: none; }
        .toast-message { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #0ecb81; color: white; padding: 12px 20px; border-radius: 40px; font-size: 12px; font-weight: bold; z-index: 10001; opacity: 0; transition: opacity 0.3s; pointer-events: none; max-width: 280px; text-align: center; }
        .profile-popup { position: fixed; top: 70px; right: 20px; background: #1e2329; border-radius: 16px; padding: 20px; width: 280px; z-index: 10003; border: 1px solid rgba(252,213,53,0.3); display: none; }
        .profile-popup.active { display: block; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10002; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: #1e2329; border-radius: 24px; padding: 24px; width: 90%; max-width: 400px; border: 1px solid rgba(252,213,53,0.3); position: relative; }
        .modal-close { position: absolute; top: 16px; right: 16px; cursor: pointer; color: #848e9c; }
        .funds-modal-input { background: #2b2f36; border: 1px solid #3b424d; border-radius: 12px; padding: 14px; color: white; width: 100%; margin-bottom: 16px; }
        .search-result { padding: 12px; border-bottom: 1px solid #2b3139; cursor: pointer; }
        .search-result:hover { background: #2b3139; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-btn { cursor: pointer; transition: all 0.2s; }
        .tab-btn.active { color: #f0b90b; border-bottom-color: #f0b90b; }
        .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #2b3139; border-top-color: #f0b90b; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .market-tab-content { display: none; }
        .market-tab-content.active { display: block; }
        .data-source-badge { position: fixed; bottom: 80px; right: 16px; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); padding: 4px 12px; border-radius: 20px; font-size: 9px; color: #f0b90b; z-index: 40; }
    </style>
</head>
<body>

<div class="market-container">
    <div class="max-w-md mx-auto min-h-screen relative">
        <header class="p-4 pb-2">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center gap-2">
                    <i data-lucide="arrow-left" class="w-6 h-6 text-white cursor-pointer" onclick="window.location.href='dashboard.html'"></i>
                    <h1 class="text-xl font-bold text-white">Markets</h1>
                </div>
                <div class="flex gap-3">
                    <i data-lucide="search" class="w-5 h-5 text-gray-400 cursor-pointer" onclick="openSearchModal()"></i>
                    <div class="w-8 h-8 bg-gray-700 rounded-full flex items-center justify-center border border-gray-600 cursor-pointer" onclick="toggleProfilePopup()">
                        <i data-lucide="user" class="w-4 h-4 text-white"></i>
                    </div>
                </div>
            </div>
            <div class="relative flex items-center bg-[#2b3139] rounded-lg px-3 py-2 mb-3">
                <i data-lucide="search" class="w-4 h-4 text-gray-400 mr-2"></i>
                <input type="text" id="coinSearch" placeholder="Search Coin Pairs" class="bg-transparent border-none outline-none text-sm w-full text-white placeholder-gray-500">
            </div>
        </header>
        
        <div class="px-4 py-2 flex gap-4 text-sm font-semibold text-gray-400 border-b border-gray-800">
            <span class="tab-btn active text-white border-b-2 border-yellow-500 pb-2" data-tab="crypto" onclick="switchTab('crypto')">Crypto</span>
            <span class="tab-btn" data-tab="spot" onclick="switchTab('spot')">Spot</span>
            <span class="tab-btn" data-tab="usdm" onclick="switchTab('usdm')">USDⓈ-M</span>
            <span class="tab-btn" data-tab="coinm" onclick="switchTab('coinm')">COIN-M</span>
        </div>
        
        <div class="px-4 py-3 flex gap-2 overflow-x-auto items-center no-scrollbar border-b border-gray-900/50">
            <span class="filter-pill active" data-filter="all" onclick="setFilter('all')">All</span>
            <span class="filter-pill" data-filter="gainers" onclick="setFilter('gainers')">Top Gainers</span>
            <span class="filter-pill" data-filter="losers" onclick="setFilter('losers')">Top Losers</span>
            <span class="filter-pill" data-filter="volume" onclick="setFilter('volume')">Highest Volume</span>
            <i data-lucide="trending-up" class="w-5 h-5 text-gray-500 ml-auto"></i>
        </div>
        
        <div class="px-4 py-3 flex justify-between text-[11px] text-gray-500 font-bold uppercase tracking-wider sticky top-0 bg-[#12161c] z-10">
            <div class="flex items-center gap-1 w-[40%] cursor-pointer" onclick="sortBy('name')">Name <i data-lucide="chevron-down" class="w-3 h-3"></i></div>
            <div class="flex items-center gap-1 w-[25%] cursor-pointer" onclick="sortBy('price')">Price <i data-lucide="chevron-down" class="w-3 h-3"></i></div>
            <div class="flex items-center gap-1 w-[35%] cursor-pointer text-right justify-end" onclick="sortBy('change')">24h Change <i data-lucide="chevron-down" class="w-3 h-3"></i></div>
        </div>
        
        <div class="flex-1 overflow-y-auto no-scrollbar px-4 pb-24">
            <div id="tab-crypto" class="market-tab-content active">
                <div id="crypto-list" class="space-y-3 py-2"></div>
            </div>
            <div id="tab-spot" class="market-tab-content">
                <div id="spot-list" class="space-y-3 py-2"></div>
            </div>
            <div id="tab-usdm" class="market-tab-content">
                <div id="usdm-list" class="space-y-3 py-2"></div>
            </div>
            <div id="tab-coinm" class="market-tab-content">
                <div id="coinm-list" class="space-y-3 py-2"></div>
            </div>
            <div id="loading-indicator" class="text-center py-8 text-gray-400 hidden">
                <div class="loading-spinner mx-auto mb-2"></div>
                Loading market data...
            </div>
        </div>
        
        <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto card-bg border-t border-gray-800/80 px-6 py-3 flex justify-between items-center z-50 backdrop-blur-md bg-opacity-95">
            <div onclick="window.location.href='dashboard.html'" class="flex flex-col items-center gap-1.5 text-gray-500 cursor-pointer"><i data-lucide="home" class="w-5 h-5"></i><span class="text-[9px] font-black uppercase">Home</span></div>
            <div onclick="window.location.href='markets.html'" class="flex flex-col items-center gap-1.5 cursor-pointer nav-item-active"><i data-lucide="bar-chart-2" class="w-5 h-5"></i><span class="text-[9px] font-black uppercase">Markets</span></div>
            <div onclick="window.location.href='trade.html'" class="flex flex-col items-center gap-1.5 text-gray-500 cursor-pointer"><i data-lucide="arrow-left-right" class="w-5 h-5"></i><span class="text-[9px] font-black uppercase">Trade</span></div>
            <div onclick="window.location.href='futures.html'" class="flex flex-col items-center gap-1.5 text-gray-500 cursor-pointer"><i data-lucide="zap" class="w-5 h-5"></i><span class="text-[9px] font-black uppercase">Futures</span></div>
            <div onclick="window.location.href='wallets.html'" class="flex flex-col items-center gap-1.5 text-gray-500 cursor-pointer"><i data-lucide="wallet" class="w-5 h-5"></i><span class="text-[9px] font-black uppercase">Wallets</span></div>
        </nav>
    </div>
</div>

<div id="profile-popup" class="profile-popup">
    <div class="profile-header"><span class="close-profile" onclick="closeProfilePopup()" style="float:right; cursor:pointer;">✕</span><div class="profile-email" id="profile-email"></div><div class="profile-id" id="profile-id"></div></div>
    <button class="logout-btn" onclick="logoutUser()" style="width:100%; margin-top:16px; padding:10px; background:#f6465d; color:white; border:none; border-radius:8px; cursor:pointer;">Logout</button>
</div>

<div id="search-modal" class="modal">
    <div class="modal-content">
        <i data-lucide="x" class="modal-close" onclick="closeModal('search-modal')"></i>
        <h3 class="text-xl font-bold mb-4 text-white">Search Cryptocurrency</h3>
        <input type="text" id="search-input" placeholder="Search by name or symbol..." class="funds-modal-input" oninput="filterSearchResults()">
        <div id="search-results" class="mt-4 max-h-64 overflow-y-auto"></div>
    </div>
</div>

<div id="toast-message" class="toast-message"></div>
<div id="data-source-badge" class="data-source-badge">Loading...</div>

<script>
    let currentUserEmail = null;
    let currentSort = { field: 'name', direction: 'asc' };
    let currentFilter = 'all';
    let currentTab = 'crypto';
    let currentDataSource = 'Loading...';
    
    let cryptoData = [];
    let spotData = [];
    let usdmData = [];
    let coinmData = [];
    
    let originalCryptoData = [];
    let originalSpotData = [];
    let originalUsdmData = [];
    let originalCoinmData = [];
    
    let updateInterval = null;
    
    // Complete 150+ Cryptocurrencies list
    const fullCoinList = [
        { symbol: 'BTC', name: 'Bitcoin' }, { symbol: 'ETH', name: 'Ethereum' }, { symbol: 'BNB', name: 'BNB' },
        { symbol: 'SOL', name: 'Solana' }, { symbol: 'XRP', name: 'Ripple' }, { symbol: 'ADA', name: 'Cardano' },
        { symbol: 'DOGE', name: 'Dogecoin' }, { symbol: 'AVAX', name: 'Avalanche' }, { symbol: 'DOT', name: 'Polkadot' },
        { symbol: 'LINK', name: 'Chainlink' }, { symbol: 'TRX', name: 'TRON' }, { symbol: 'MATIC', name: 'Polygon' },
        { symbol: 'NEAR', name: 'NEAR Protocol' }, { symbol: 'UNI', name: 'Uniswap' }, { symbol: 'LTC', name: 'Litecoin' },
        { symbol: 'SHIB', name: 'Shiba Inu' }, { symbol: 'PEPE', name: 'Pepe' }, { symbol: 'BONK', name: 'Bonk' },
        { symbol: 'WIF', name: 'Wif' }, { symbol: 'FLOKI', name: 'Floki' }, { symbol: 'APT', name: 'Aptos' },
        { symbol: 'ARB', name: 'Arbitrum' }, { symbol: 'OP', name: 'Optimism' }, { symbol: 'INJ', name: 'Injective' },
        { symbol: 'RNDR', name: 'Render' }, { symbol: 'GRT', name: 'The Graph' }, { symbol: 'AAVE', name: 'Aave' },
        { symbol: 'MKR', name: 'Maker' }, { symbol: 'ALGO', name: 'Algorand' }, { symbol: 'VET', name: 'VeChain' },
        { symbol: 'EGLD', name: 'MultiversX' }, { symbol: 'QNT', name: 'Quant' }, { symbol: 'AXS', name: 'Axie Infinity' },
        { symbol: 'SAND', name: 'The Sandbox' }, { symbol: 'MANA', name: 'Decentraland' }, { symbol: 'GALA', name: 'Gala' },
        { symbol: 'ENJ', name: 'Enjin' }, { symbol: 'CHZ', name: 'Chiliz' }, { symbol: 'THETA', name: 'Theta' },
        { symbol: 'FTM', name: 'Fantom' }, { symbol: 'ZIL', name: 'Zilliqa' }, { symbol: 'XLM', name: 'Stellar' },
        { symbol: 'EOS', name: 'EOS' }, { symbol: 'NEO', name: 'Neo' }, { symbol: 'IOTA', name: 'IOTA' },
        { symbol: 'DASH', name: 'Dash' }, { symbol: 'ZEC', name: 'Zcash' }, { symbol: 'KSM', name: 'Kusama' },
        { symbol: 'CELO', name: 'Celo' }, { symbol: 'ONE', name: 'Harmony' }, { symbol: 'FET', name: 'Fetch.ai' },
        { symbol: 'AGIX', name: 'SingularityNET' }, { symbol: 'OCEAN', name: 'Ocean Protocol' }, { symbol: 'BABYDOGE', name: 'Baby Doge' },
        { symbol: 'MEME', name: 'Memecoin' }, { symbol: 'NOT', name: 'Notcoin' }, { symbol: 'BRETT', name: 'Brett' },
        { symbol: 'CRO', name: 'Cronos' }, { symbol: 'OKB', name: 'OKB' }, { symbol: 'KCS', name: 'KuCoin' },
        { symbol: 'HT', name: 'Huobi' }, { symbol: 'GT', name: 'Gate' }, { symbol: 'LEO', name: 'LEO' },
        { symbol: 'XMR', name: 'Monero' }, { symbol: 'XVG', name: 'Verge' }, { symbol: 'FIRO', name: 'Firo' },
        { symbol: 'ZEN', name: 'Horizen' }, { symbol: 'DCR', name: 'Decred' }, { symbol: 'SC', name: 'Siacoin' },
        { symbol: 'STORJ', name: 'Storj' }, { symbol: 'BLZ', name: 'Bluzelle' }, { symbol: 'ANKR', name: 'Ankr' }
    ];
    
    function updateDataSourceBadge() {
        const badge = document.getElementById('data-source-badge');
        if (badge) badge.textContent = currentDataSource;
    }
    
    function getRandomColor(symbol) {
        const colors = ['#f0b90b', '#0ecb81', '#3b82f6', '#8b5cf6', '#ec489a', '#06b6d4', '#ef4444', '#f97316'];
        const index = symbol.charCodeAt(0) % colors.length;
        return colors[index];
    }
    
    function getFirstLetter(symbol) {
        return symbol.charAt(0);
    }
    
    function generateSparkline(isPositive) {
        const points = Array.from({length: 12}, () => Math.random() * 20 + 5);
        const lineColor = isPositive ? '#2ebd85' : '#f6465d';
        const svgWidth = 60, svgHeight = 20;
        const polylinePoints = points.map((p, i) => `${i * (svgWidth / points.length)}, ${svgHeight - p}`).join(' ');
        return `<svg width="${svgWidth}" height="${svgHeight}"><polyline fill="none" stroke="${lineColor}" stroke-width="1.5" points="${polylinePoints}"/></svg>`;
    }
    
    function renderMarketList(containerId, data) {
        const listContainer = document.getElementById(containerId);
        if(!listContainer) return;
        
        if (!data || data.length === 0) {
            listContainer.innerHTML = '<div class="text-center py-8 text-gray-400">No cryptocurrencies found</div>';
            return;
        }
        
        listContainer.innerHTML = '';
        const displayData = data.slice(0, 150);
        
        displayData.forEach((asset) => {
            const colorClass = asset.isPositive ? 'price-up-bg' : 'price-down-bg';
            const changeSymbol = asset.isPositive ? '+' : '';
            const formattedPrice = asset.price >= 1 ? asset.price.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : asset.price.toFixed(8);
            const volumeDisplay = asset.volume >= 1000000000 ? (asset.volume / 1000000000).toFixed(2) + 'B' : (asset.volume / 1000000).toFixed(2) + 'M';
            const bgColor = getRandomColor(asset.symbol);
            
            listContainer.innerHTML += `
                <div class="flex justify-between items-center p-3 rounded-xl bg-[#1e2329] hover:bg-[#2b3139] transition cursor-pointer" onclick="selectCrypto('${asset.symbol}')">
                    <div class="flex items-center gap-3 w-[40%]">
                        <div class="w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm text-white" style="background: ${bgColor}">${getFirstLetter(asset.symbol)}</div>
                        <div>
                            <div class="font-bold text-sm text-white">${asset.symbol}</div>
                            <div class="text-[10px] text-gray-500 truncate max-w-[80px]">${asset.name}</div>
                        </div>
                    </div>
                    <div class="w-[25%] text-right">
                        <div class="text-sm font-bold text-white price-val">$${formattedPrice}</div>
                        <div class="text-[9px] text-gray-500">${volumeDisplay}</div>
                    </div>
                    <div class="flex items-center justify-end w-[35%] gap-2">
                        <div class="${colorClass} change-pill text-white text-xs font-bold px-2 py-1 rounded-md text-center" style="min-width: 65px; max-width: 85px;">${changeSymbol}${asset.change}%</div>
                        <div class="hidden md:block">${generateSparkline(asset.isPositive)}</div>
                    </div>
                </div>
            `;
        });
    }
    
    // Fetch from Binance API
    async function fetchFromBinance() {
        try {
            const response = await fetch('https://api.binance.com/api/v3/ticker/24hr');
            if (!response.ok) throw new Error('Binance API failed');
            return await response.json();
        } catch (error) {
            console.error('Binance fetch failed:', error);
            return null;
        }
    }
    
    // Fetch from CoinPaprika API (no API key required)
    async function fetchFromCoinPaprika() {
        try {
            const response = await fetch('https://api.coinpaprika.com/v1/tickers');
            if (!response.ok) throw new Error('CoinPaprika API failed');
            const data = await response.json();
            return data.slice(0, 200);
        } catch (error) {
            console.error('CoinPaprika fetch failed:', error);
            return null;
        }
    }
    
    // Process Binance data
    function processBinanceData(data) {
        const usdtPairs = data.filter(item => item.symbol.endsWith('USDT'));
        return usdtPairs.slice(0, 150).map(item => ({
            symbol: item.symbol.replace('USDT', ''),
            name: fullCoinList.find(c => c.symbol === item.symbol.replace('USDT', ''))?.name || item.symbol.replace('USDT', ''),
            price: parseFloat(item.lastPrice),
            change: parseFloat(item.priceChangePercent),
            isPositive: parseFloat(item.priceChangePercent) >= 0,
            volume: parseFloat(item.quoteVolume),
            high: parseFloat(item.highPrice),
            low: parseFloat(item.lowPrice)
        }));
    }
    
    // Process CoinPaprika data
    function processCoinPaprikaData(data) {
        const mappedData = [];
        for (const coin of fullCoinList.slice(0, 150)) {
            const paprikaCoin = data.find(c => c.symbol === coin.symbol);
            if (paprikaCoin) {
                mappedData.push({
                    symbol: coin.symbol,
                    name: coin.name,
                    price: paprikaCoin.quotes.USD.price,
                    change: paprikaCoin.quotes.USD.percent_change_24h || 0,
                    isPositive: (paprikaCoin.quotes.USD.percent_change_24h || 0) >= 0,
                    volume: paprikaCoin.quotes.USD.volume_24h || 0,
                    high: 0,
                    low: 0
                });
            } else {
                mappedData.push({
                    symbol: coin.symbol,
                    name: coin.name,
                    price: getFallbackPrice(coin.symbol),
                    change: (Math.random() * 10 - 3).toFixed(2),
                    isPositive: Math.random() > 0.4,
                    volume: Math.random() * 5000000000,
                    high: 0,
                    low: 0
                });
            }
        }
        return mappedData;
    }
    
    // Fallback data
    function generateFallbackData(coinList) {
        return coinList.slice(0, 150).map(coin => ({
            symbol: coin.symbol,
            name: coin.name,
            price: getFallbackPrice(coin.symbol),
            change: (Math.random() * 10 - 3).toFixed(2),
            isPositive: Math.random() > 0.4,
            volume: Math.random() * 5000000000,
            high: 0,
            low: 0
        }));
    }
    
    function getFallbackPrice(symbol) {
        const prices = {
            'BTC': 77639.60, 'ETH': 2325.11, 'BNB': 585.20, 'SOL': 158.75, 'XRP': 0.585,
            'ADA': 0.445, 'DOGE': 0.162, 'AVAX': 35.80, 'DOT': 7.25, 'LINK': 16.85,
            'TRX': 0.115, 'MATIC': 0.785, 'NEAR': 4.95, 'UNI': 8.95, 'LTC': 88.50,
            'SHIB': 0.0000235, 'PEPE': 0.0000112, 'BONK': 0.0000265, 'WIF': 2.15, 'FLOKI': 0.000165
        };
        return prices[symbol] || Math.random() * 100;
    }
    
    // Main fetch with failover
    async function fetchSpotData() {
        // Try Binance first
        const binanceData = await fetchFromBinance();
        if (binanceData) {
            currentDataSource = '📊 Binance (Live)';
            updateDataSourceBadge();
            return processBinanceData(binanceData);
        }
        
        // Try CoinPaprika as fallback
        const paprikaData = await fetchFromCoinPaprika();
        if (paprikaData) {
            currentDataSource = '📈 CoinPaprika (Live)';
            updateDataSourceBadge();
            return processCoinPaprikaData(paprikaData);
        }
        
        // Final fallback to static data
        currentDataSource = '⚠️ Fallback Data';
        updateDataSourceBadge();
        return generateFallbackData(fullCoinList);
    }
    
    async function fetchUsdmData() {
        try {
            const binanceData = await fetchFromBinance();
            if (binanceData) {
                const usdtPairs = binanceData.filter(item => item.symbol.endsWith('USDT'));
                return usdtPairs.slice(0, 100).map(item => ({
                    symbol: item.symbol.replace('USDT', ''),
                    name: (fullCoinList.find(c => c.symbol === item.symbol.replace('USDT', ''))?.name || item.symbol.replace('USDT', '')) + ' Perp',
                    price: parseFloat(item.lastPrice),
                    change: parseFloat(item.priceChangePercent),
                    isPositive: parseFloat(item.priceChangePercent) >= 0,
                    volume: parseFloat(item.quoteVolume) || 0,
                    high: parseFloat(item.highPrice),
                    low: parseFloat(item.lowPrice)
                }));
            }
            return generateFallbackData(fullCoinList.slice(0, 100));
        } catch (error) {
            return generateFallbackData(fullCoinList.slice(0, 100));
        }
    }
    
    async function fetchCoinmData() {
        return generateFallbackData(fullCoinList.slice(0, 50));
    }
    
    async function loadAllMarketData() {
        const [spotResult, usdmResult, coinmResult] = await Promise.all([
            fetchSpotData(),
            fetchUsdmData(),
            fetchCoinmData()
        ]);
        
        cryptoData = spotResult;
        spotData = spotResult;
        usdmData = usdmResult;
        coinmData = coinmResult;
        
        originalCryptoData = [...cryptoData];
        originalSpotData = [...spotData];
        originalUsdmData = [...usdmData];
        originalCoinmData = [...coinmData];
        
        renderCurrentTab();
    }
    
    function renderCurrentTab() {
        if (currentTab === 'crypto') renderMarketList('crypto-list', cryptoData);
        else if (currentTab === 'spot') renderMarketList('spot-list', spotData);
        else if (currentTab === 'usdm') renderMarketList('usdm-list', usdmData);
        else if (currentTab === 'coinm') renderMarketList('coinm-list', coinmData);
    }
    
    function getCurrentData() {
        if (currentTab === 'crypto') return cryptoData;
        if (currentTab === 'spot') return spotData;
        if (currentTab === 'usdm') return usdmData;
        if (currentTab === 'coinm') return coinmData;
        return cryptoData;
    }
    
    function getOriginalData() {
        if (currentTab === 'crypto') return originalCryptoData;
        if (currentTab === 'spot') return originalSpotData;
        if (currentTab === 'usdm') return originalUsdmData;
        if (currentTab === 'coinm') return originalCoinmData;
        return originalCryptoData;
    }
    
    function setCurrentData(newData) {
        if (currentTab === 'crypto') cryptoData = newData;
        else if (currentTab === 'spot') spotData = newData;
        else if (currentTab === 'usdm') usdmData = newData;
        else if (currentTab === 'coinm') coinmData = newData;
    }
    
    function sortBy(field) {
        if (currentSort.field === field) currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
        else { currentSort.field = field; currentSort.direction = 'asc'; }
        
        let currentData = getCurrentData();
        let sorted = [...currentData];
        sorted.sort((a, b) => {
            let aVal = a[field], bVal = b[field];
            if (field === 'name') { aVal = a.symbol; bVal = b.symbol; }
            return currentSort.direction === 'asc' ? (aVal > bVal ? 1 : -1) : (aVal < bVal ? 1 : -1);
        });
        setCurrentData(sorted);
        renderCurrentTab();
    }
    
    function setFilter(filter) {
        currentFilter = filter;
        document.querySelectorAll('.filter-pill').forEach(pill => pill.classList.remove('active'));
        const activePill = document.querySelector(`.filter-pill[data-filter="${filter}"]`);
        if (activePill) activePill.classList.add('active');
        
        let original = getOriginalData();
        let filtered = [...original];
        if (filter === 'gainers') filtered = filtered.filter(a => a.isPositive).sort((a, b) => b.change - a.change);
        else if (filter === 'losers') filtered = filtered.filter(a => !a.isPositive).sort((a, b) => a.change - b.change);
        else if (filter === 'volume') filtered = filtered.sort((a, b) => b.volume - a.volume);
        
        setCurrentData(filtered);
        renderCurrentTab();
    }
    
    async function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('text-white', 'border-b-2', 'border-yellow-500');
            btn.classList.add('text-gray-400');
        });
        const activeTab = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
        if (activeTab) {
            activeTab.classList.add('text-white', 'border-b-2', 'border-yellow-500');
            activeTab.classList.remove('text-gray-400');
        }
        document.querySelectorAll('.market-tab-content').forEach(content => content.classList.remove('active'));
        const tabContent = document.getElementById(`tab-${tab}`);
        if (tabContent) tabContent.classList.add('active');
        
        currentFilter = 'all';
        document.querySelectorAll('.filter-pill').forEach(pill => pill.classList.remove('active'));
        const allPill = document.querySelector('.filter-pill[data-filter="all"]');
        if (allPill) allPill.classList.add('active');
        
        currentSort = { field: 'name', direction: 'asc' };
        renderCurrentTab();
    }
    
    function filterSearch() {
        const searchTerm = document.getElementById('coinSearch').value.toLowerCase();
        let original = getOriginalData();
        let filtered = !searchTerm ? [...original] : original.filter(a => a.symbol.toLowerCase().includes(searchTerm) || a.name.toLowerCase().includes(searchTerm));
        setCurrentData(filtered);
        renderCurrentTab();
    }
    
    function selectCrypto(symbol) { showToast(`Selected ${symbol}`, true); }
    function openSearchModal() { openModal('search-modal'); setTimeout(() => filterSearchResults(), 100); }
    
    function filterSearchResults() {
        const searchTerm = document.getElementById('search-input')?.value.toLowerCase() || '';
        const original = getOriginalData();
        const results = original.filter(c => c.symbol.toLowerCase().includes(searchTerm) || c.name.toLowerCase().includes(searchTerm));
        const container = document.getElementById('search-results');
        if (container) {
            container.innerHTML = results.length === 0 ? '<p class="text-gray-500 text-center py-4">No results found</p>' : 
                results.slice(0, 20).map(c => `<div class="search-result" onclick="selectCryptoAndClose('${c.symbol}')"><div class="font-bold text-white">${c.symbol}</div><div class="text-xs text-gray-400">${c.name}</div><div class="text-xs text-yellow-500">$${c.price.toLocaleString()}</div></div>`).join('');
        }
    }
    
    function selectCryptoAndClose(symbol) { showToast(`Selected ${symbol}`, true); closeModal('search-modal'); document.getElementById('search-input').value = ''; }
    function showToast(msg, isSuccess = true) { const toast = document.getElementById('toast-message'); toast.textContent = msg; toast.style.backgroundColor = isSuccess ? '#0ecb81' : '#f6465d'; toast.style.opacity = '1'; setTimeout(() => toast.style.opacity = '0', 3000); }
    function openModal(modalId) { const modal = document.getElementById(modalId); if (modal) modal.classList.add('active'); if (typeof lucide !== 'undefined') lucide.createIcons(); }
    function closeModal(modalId) { const modal = document.getElementById(modalId); if (modal) modal.classList.remove('active'); }
    
    function toggleProfilePopup() {
        const popup = document.getElementById('profile-popup');
        if (popup.classList.contains('active')) popup.classList.remove('active');
        else { 
            const emailEl = document.getElementById('profile-email');
            const idEl = document.getElementById('profile-id');
            if (emailEl) emailEl.innerText = currentUserEmail || 'User'; 
            if (idEl) idEl.innerText = `Account ID: ${Math.floor(1000000000000000 + Math.random() * 9000000000000000)}`; 
            popup.classList.add('active'); 
        }
    }
    
    function closeProfilePopup() { const popup = document.getElementById('profile-popup'); if (popup) popup.classList.remove('active'); }
    function logoutUser() { localStorage.removeItem('binance_session_email'); localStorage.removeItem('binance_user_balance'); window.location.href = 'index.html'; }
    function checkSession() { const savedEmail = localStorage.getItem('binance_session_email'); if (!savedEmail) window.location.href = 'index.html'; else currentUserEmail = savedEmail; }
    
    window.addEventListener('load', () => {
        checkSession();
        if (typeof lucide !== 'undefined') lucide.createIcons();
        loadAllMarketData();
        const searchInput = document.getElementById('coinSearch');
        if (searchInput) searchInput.addEventListener('input', filterSearch);
        if (updateInterval) clearInterval(updateInterval);
        updateInterval = setInterval(() => loadAllMarketData(), 30000);
    });
</script>
</body>
</html>
